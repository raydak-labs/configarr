name: CLI Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      baseline:
        description: "Enable baseline builds for older CPU architectures"
        required: false
        type: boolean
        default: false

permissions: {}

jobs:
  build-cli:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            platform: linux-x64
          - target: bun-linux-arm64
            platform: linux-arm64
          - target: bun-darwin-x64
            platform: darwin-x64
          - target: bun-darwin-arm64
            platform: darwin-arm64
          - target: bun-windows-x64
            platform: windows-x64
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Inject enhanced GitHub environment variables
        uses: rlespinasse/github-slug-action@e6f261660910b273384c5c42b17a0217881b217a # v5.6.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: latest

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          package-manager-cache: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
          no-cache: true

      - name: Install deps
        run: pnpm i

      - name: Set build variables
        id: vars
        env:
          GITHUB_REF_SLUG: ${{ env.GITHUB_REF_SLUG }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          VERSION="${GITHUB_REF_SLUG}"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "run_id=${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT
          echo "repo=${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Build CLI
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
          VERSION: ${{ steps.vars.outputs.version }}
          BUILD_TIME: ${{ steps.vars.outputs.build_time }}
          RUN_ID: ${{ steps.vars.outputs.run_id }}
          REPO: ${{ steps.vars.outputs.repo }}
          SHA: ${{ steps.vars.outputs.sha }}
          BASELINE: ${{ github.event.inputs.baseline }}
        run: |
          FLAGS=""

          if [[ "${PLATFORM}" == windows-* ]]; then
            echo "No custom flags for windows"
          else
            FLAGS="${FLAGS} --bytecode"
          fi

          if [[ "${BASELINE}" == "true" ]]; then
            FLAGS="${FLAGS} --target=bun"
          else
            echo "Non baseline build"
          fi

          echo "Using additional build flags: $FLAGS"

          bun build src/index.ts \
            --compile --minify --sourcemap src/index.ts \
            --outfile configarr \
            --define 'process.env.CONFIGARR_VERSION="${VERSION}"' \
            --define 'process.env.BUILD_TIME="${BUILD_TIME}"' \
            --define 'process.env.GITHUB_RUN_ID="${RUN_ID}"' \
            --define 'process.env.GITHUB_REPO="${REPO}"' \
            --define 'process.env.GITHUB_SHA="${SHA}"' \
            --define 'process.env.BUILD_PLATFORM="${PLATFORM}"' \
            --target="${TARGET}" \
            $FLAGS

      - name: Compress CLI
        run: tar -cJf configarr-${{ matrix.platform }}.tar.xz configarr*

      - name: Upload CLI artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: configarr-${{ matrix.platform }}.tar.xz
          path: configarr-${{ matrix.platform }}.tar.xz
          retention-days: 1

  release:
    needs: build-cli
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Extract tar.gz files
        run: |
          find artifacts -name "*.tar.gz" -type f -exec sh -c '
            dir=$(dirname "$1")
            base=$(basename "$1" .tar.gz)
            mkdir -p "$dir/extracted"
            tar -xzf "$1" -C "$dir/extracted"
            mv "$dir/extracted"/* "$dir/" 2>/dev/null || true
            rmdir "$dir/extracted" 2>/dev/null || true
          ' _ {} \;

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s globstar nullglob
          gh release create "${TAG_NAME}" \
            artifacts/**/configarr-*.tar.xz \
            --title "${TAG_NAME}"
